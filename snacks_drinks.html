a{color:#20ff00;text-decoration:none}

.header{text-align:center;margin-bottom:32px}

.filters{display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;position:relative}
.ms-btn{background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:8px 16px;color:#aaa;cursor:pointer;font-size:13px;min-width:160px;text-align:left}
.ms-drop{display:none;position:absolute;top:100%;left:0;background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:8px;z-index:50;min-width:220px;max-height:320px;overflow-y:auto}
.ms-drop.open{display:block}
.ms-drop input[type=text]{width:100%;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px;padding:6px;color:#fff;font-size:12px;margin-bottom:6px}
.ms-drop label{display:block;padding:3px 0;font-size:12px;color:#ccc;cursor:pointer}
.ms-drop label:hover{color:#20ff00}
.ms-drop input[type=checkbox]{margin-right:6px;accent-color:#20ff00}
.ms-actions{display:flex;gap:12px;margin-bottom:6px;font-size:11px}
.ms-actions span{color:#20ff00;cursor:pointer}
.ms-actions span:hover{text-decoration:underline}
.week-scroller{max-height:200px;overflow-y:auto}
.block{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:24px;margin-bottom:24px}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.block-title{font-size:18px;font-weight:600}
.block-title .count{font-size:13px;color:#555;font-weight:400}
.export-btns{display:flex;gap:6px}
.export-btn{background:#1a1a1a;border:1px solid #222;border-radius:6px;padding:4px 12px;color:#888;font-size:11px;cursor:pointer;transition:all .2s}
.export-btn:hover{border-color:#20ff00;color:#20ff00}
.kpi-strip{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.mini-kpi{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:10px 14px;min-width:120px;flex:1}

.mk-value.bad{color:#ff4444}
.block-sliders{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.slider-group{flex:1;min-width:200px}
.slider-group label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.sv{color:#20ff00;font-weight:600}
.dual-slider{position:relative;height:28px}
.dual-slider .track{position:absolute;top:12px;left:0;right:0;height:4px;background:#1a1a1a;border-radius:2px}
.dual-slider .track-fill{position:absolute;top:12px;height:4px;background:#20ff00;border-radius:2px;opacity:0.4}
.dual-slider input[type=range]{position:absolute;top:0;left:0;width:100%;height:28px;-webkit-appearance:none;appearance:none;background:transparent;pointer-events:none}

.bestseller-btn-wrap{display:flex;align-items:center;justify-content:center;min-width:120px}
.bestseller-btn{background:#20ff00;color:#0a0a0a;border:none;padding:6px 22px;border-radius:20px;font-weight:700;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap}
.bestseller-btn:hover{background:#1de000;box-shadow:0 0 12px rgba(32,255,0,.4)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:5}
th{background:#0a0a0a;color:#888;font-weight:500;text-align:left;padding:8px 6px;border-bottom:1px solid #1a1a1a;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:#20ff00}
.sort-arrow{color:#20ff00;margin-left:3px;font-size:10px}
td{padding:6px;border-bottom:1px solid #0d0d0d;color:#ccc}

.num{text-align:right;font-variant-numeric:tabular-nums}
.chf{text-align:right;font-variant-numeric:tabular-nums;color:#20ff00}
.pct{text-align:right}
.good{color:#20ff00}
.warn{color:#ffaa00}
.bad{color:#ff4444}
.sparkline{width:120px}
.sparkline svg{width:100%;height:24px}
.table-wrap{overflow-x:auto;max-height:600px;overflow-y:auto}
.search-wrap{position:relative;margin-bottom:16px;max-width:360px;margin-left:auto;margin-right:auto}
.search-wrap input{width:100%;background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:10px 14px;color:#fff;font-size:13px}
.search-wrap input:focus{outline:none;border-color:#20ff00}
.search-results{position:absolute;top:100%;left:0;right:0;background:#111;border:1px solid #1a1a1a;border-radius:8px;max-height:200px;overflow-y:auto;z-index:20;display:none}
.search-results.open{display:block}
.search-results div{padding:8px 14px;font-size:12px;color:#ccc;cursor:pointer}
.search-results div:hover{background:#1a1a1a;color:#20ff00}
.highlight{background:#20ff0030;color:#20ff00;border-radius:2px;padding:0 2px}
.footer{text-align:center;margin-top:32px;font-size:11px;color:#333}

// ==================== MULTI-SELECT ====================
function MultiSelect(containerId, items, placeholder, onChange) {
  var self = this;
  self.selected = new Set(items);
  self.items = items;
  var container = document.getElementById(containerId);
  var btn = document.createElement('div');
  btn.className = 'ms-btn';
  btn.textContent = placeholder;
  var drop = document.createElement('div');
  drop.className = 'ms-drop';
  var search = document.createElement('input');
  search.type = 'text'; search.placeholder = 'Search...';
  drop.appendChild(search);
  var actions = document.createElement('div');
  actions.className = 'ms-actions';
  var selAll = document.createElement('span'); selAll.textContent = 'Select all';
  var clrAll = document.createElement('span'); clrAll.textContent = 'Clear all';
  actions.appendChild(selAll); actions.appendChild(clrAll);
  drop.appendChild(actions);
  var list = document.createElement('div');
  list.className = containerId === 'msWeeks' ? 'week-scroller' : '';
  items.forEach(function(item) {
    var lbl = document.createElement('label');
    var cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = true; cb.value = item;
    cb.addEventListener('change', function() {
      if (this.checked) self.selected.add(item); else self.selected.delete(item);
      updateLabel(); onChange();
    });
    lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' ' + item));
    list.appendChild(lbl);
  });
  drop.appendChild(list);
  selAll.addEventListener('click', function() {
    self.selected = new Set(items);
    drop.querySelectorAll('input[type=checkbox]').forEach(function(cb) { cb.checked = true; });
    updateLabel(); onChange();
  });
  clrAll.addEventListener('click', function() {
    self.selected.clear();
    drop.querySelectorAll('input[type=checkbox]').forEach(function(cb) { cb.checked = false; });
    updateLabel(); onChange();
  });
  search.addEventListener('input', function() {
    var q = this.value.toLowerCase();
    list.querySelectorAll('label').forEach(function(lbl) {
      lbl.style.display = lbl.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
  btn.addEventListener('click', function(e) { e.stopPropagation(); drop.classList.toggle('open'); });
  document.addEventListener('click', function() { drop.classList.remove('open'); });
  drop.addEventListener('click', function(e) { e.stopPropagation(); });
  function updateLabel() {
    if (self.selected.size === items.length) btn.textContent = placeholder;
    else if (self.selected.size === 0) btn.textContent = 'None selected';
    else if (self.selected.size <= 2) btn.textContent = Array.from(self.selected).join(', ');
    else btn.textContent = self.selected.size + ' selected';
  }
  container.appendChild(btn); container.appendChild(drop);
  self.getSelected = function() { return self.selected; };
  self.isAll = function() { return self.selected.size === items.length; };
}

// ==================== HELPERS ====================
function fmt(n) { return n >= 1000 ? Math.round(n).toLocaleString('en-CH') : Math.round(n).toString(); }
function fmtCHF(n) { return 'CHF ' + fmt(Math.abs(n)); }
function fmtPct(n) { return (typeof n === 'number' ? n.toFixed(1) : '0.0') + '%'; }
function makeSparklineSVG(data, idxs) {
  var vals = idxs.map(function(i) { return data[i] || 0; });
  if (!vals.length) return '';
  var max = Math.max.apply(null, vals) || 1;
  var w = 240, h = 24, pad = 2;
  var step = vals.length > 1 ? (w - 2*pad) / (vals.length - 1) : 0;
  var pts = vals.map(function(v, i) { return (pad + i*step) + ',' + (h - pad - (v/max)*(h-2*pad)); }).join(' ');
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"><polyline points="'+pts+'" fill="none" stroke="#20ff00" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}

var allProducts = DATA.products.map(function(p) { return p.product; }).sort();

msWeeks = new MultiSelect('msWeeks', DATA.weeks, 'All weeks (' + DATA.weeks.length + ')', render);
msProducts = new MultiSelect('msProducts', allProducts, 'All products (' + allProducts.length + ')', render);

// ==================== FILTER ====================
function getFilteredProducts() {
  var selWeeks = msWeeks.getSelected();
  var selProds = msProducts.getSelected();
  var weekIdxs = [];
  DATA.weeks.forEach(function(w, i) { if (selWeeks.has(w)) weekIdxs.push(i); });

  if (msWeeks.isAll() && msProducts.isAll()) {
    return {products: DATA.products, weekIdxs: weekIdxs};
  }

  var pwMap = {};
  DATA.prod_weekly.forEach(function(r) {
    if (!selWeeks.has(r.week)) return;
    if (!pwMap[r.product]) pwMap[r.product] = {sold:0, revenue:0, weeks:0};
    var m = pwMap[r.product];
    m.sold += r.sold; m.revenue += r.revenue; m.weeks++;
  });

  var filtered = [];
  DATA.products.forEach(function(p) {
    if (!selProds.has(p.product)) return;
    var pw = pwMap[p.product];
    if (!pw || pw.sold === 0) return;
    var wom = pw.weeks;
    filtered.push({
      product: p.product, sku: p.sku, block: p.block, price: p.price,
      total_sold: pw.sold, total_revenue: Math.round(pw.revenue * 100) / 100,
      weeks_on_menu: wom, total_weeks: weekIdxs.length,
      participation_pct: weekIdxs.length > 0 ? +(wom / weekIdxs.length * 100).toFixed(1) : 0,
      avg_sold_wk: wom > 0 ? +(pw.sold / wom).toFixed(1) : 0,
      avg_revenue_wk: wom > 0 ? +(pw.revenue / wom).toFixed(1) : 0,
      locations: p.locations,
      sparkline: p.sparkline
    });
  });
  return {products: filtered, weekIdxs: weekIdxs};
}

// ==================== RENDER ====================
var searchHighlight = '';

function render(resetSliders) {
  if (resetSliders !== false) window._slidersInitialized = false;
  var result = getFilteredProducts();
  var prods = result.products;
  var weekIdxs = result.weekIdxs;

  if (searchHighlight) {
    prods = prods.filter(function(p) {
      return p.product.toLowerCase().indexOf(searchHighlight) >= 0 ||
             (p.sku || '').toLowerCase().indexOf(searchHighlight) >= 0;
    });
  }

  blockData.sweet = prods.filter(function(p) { return BLOCK_MAP[p.block] === 'sweet'; });
  blockData.savory = prods.filter(function(p) { return BLOCK_MAP[p.block] === 'savory'; });
  blockData.drinks = prods.filter(function(p) { return BLOCK_MAP[p.block] === 'drinks'; });

  ['sweet','savory','drinks'].forEach(function(bid) {
    if (!window._slidersInitialized) initSliders(bid, blockData[bid]);
    rerenderBlock(bid);
  });
  if (!window._slidersInitialized) window._slidersInitialized = true;
}

  var st = sortState[bid];
  products.sort(function(a, b) {
    var va = a[st.col], vb = b[st.col];
    if (typeof va === 'string') return st.dir * va.localeCompare(vb);
    return st.dir * (va - vb);
  });

  var totSold=0, totRev=0;
  products.forEach(function(p) { totSold += p.total_sold; totRev += p.total_revenue; });
  var avgPrice = products.length > 0 ? totRev / totSold : 0;

  var countEl = document.getElementById(bid + 'Count');

  var kpiEl = document.getElementById(bid + 'Kpis');

    '<div class="mini-kpi"><div class="mk-label">Units Sold</div><div class="mk-value">' + fmt(totSold) + '</div></div>' +
    '<div class="mini-kpi"><div class="mk-label">Products</div><div class="mk-value">' + products.length + '</div></div>' +
    '<div class="mini-kpi"><div class="mk-label">Avg Price</div><div class="mk-value">CHF ' + avgPrice.toFixed(2) + '</div></div>' +
    '<div class="mini-kpi"><div class="mk-label">Avg Sold/Wk</div><div class="mk-value">' + fmt(weekIdxs.length > 0 ? Math.round(totSold / weekIdxs.length) : 0) + '</div></div>';

  var cols = [

// ==================== SLIDERS ====================
function initSliders(bid, products) {
  if (!products || !products.length) return;
  var maxSold = Math.ceil(Math.max.apply(null, products.map(function(p){return p.total_sold;})));
  var maxRev = Math.ceil(Math.max.apply(null, products.map(function(p){return p.total_revenue;})));
  maxSold = Math.max(maxSold, 10); maxRev = Math.max(maxRev, 100);

  var sMin = document.getElementById(bid+'SoldMin'), sHi = document.getElementById(bid+'SoldHi');
  var rMin = document.getElementById(bid+'RevMin'), rHi = document.getElementById(bid+'RevHi');
  if (!sMin) return;

  sMin.max = maxSold; sHi.max = maxSold; sMin.value = 0; sHi.value = maxSold;
  rMin.max = maxRev; rHi.max = maxRev; rMin.value = 0; rHi.value = maxRev;

  sliderState[bid] = {soldMin:0, soldMax:maxSold, revMin:0, revMax:maxRev};
  updateSliderLabels(bid);
}

function updateSlider(bid) {
  var sMin = +document.getElementById(bid+'SoldMin').value;
  var sHi = +document.getElementById(bid+'SoldHi').value;
  var rMin = +document.getElementById(bid+'RevMin').value;
  var rHi = +document.getElementById(bid+'RevHi').value;
  if (sMin > sHi) { var tmp = sMin; sMin = sHi; sHi = tmp; }
  if (rMin > rHi) { var tmp2 = rMin; rMin = rHi; rHi = tmp2; }
  sliderState[bid] = {soldMin:sMin, soldMax:sHi, revMin:rMin, revMax:rHi};
  updateSliderLabels(bid);
  updateTrackFill(bid+'Sold');
  updateTrackFill(bid+'Rev');
  rerenderBlock(bid);
}

function updateSliderLabels(bid) {
  var s = sliderState[bid];
  document.getElementById(bid+'SoldVal').textContent = fmt(s.soldMin);
  document.getElementById(bid+'SoldMax').textContent = fmt(s.soldMax);
  document.getElementById(bid+'RevVal').textContent = fmt(s.revMin);
  document.getElementById(bid+'RevMax').textContent = fmt(s.revMax);
}

function updateTrackFill(prefix) {
  var lo = document.getElementById(prefix+'Min');
  var hi = document.getElementById(prefix+'Hi');
  var fill = document.getElementById(prefix+'Fill');
  if (!lo || !fill) return;
  var max = +lo.max || 1;
  var left = (+lo.value / max) * 100;
  var right = (+hi.value / max) * 100;
  if (left > right) { var t = left; left = right; right = t; }
  fill.style.left = left + '%'; fill.style.width = (right - left) + '%';
}

function rerenderBlock(bid) {
  var s = sliderState[bid];
  var filtered = blockData[bid].filter(function(p) {
    return p.total_sold >= s.soldMin && p.total_sold <= s.soldMax &&
           p.total_revenue >= s.revMin && p.total_revenue <= s.revMax;
  });
  var result = getFilteredProducts();
  renderBlock(bid, filtered, result.weekIdxs);
}

// ==================== PRESETS ====================
var presetConfig = {
  sweet: {n: 20, label: 'BOTTOM 20'},
  savory: {n: 20, label: 'BOTTOM 20'},
  drinks: {n: 6, label: 'BOTTOM 6'}
};

function applyPreset(bid) {
  var n = presetConfig[bid].n;
  // Sort by total_sold ascending, take bottom N
  var sorted = blockData[bid].slice().sort(function(a,b) { return a.total_sold - b.total_sold; });
  if (sorted.length === 0) return;
  var cutoff = sorted.length <= n ? sorted[sorted.length - 1].total_sold : sorted[n - 1].total_sold;

  var sMin = document.getElementById(bid+'SoldMin');
  var sHi = document.getElementById(bid+'SoldHi');
  var rMin = document.getElementById(bid+'RevMin');
  var rHi = document.getElementById(bid+'RevHi');

  sMin.value = 0;
  sHi.value = cutoff;
  rMin.value = 0;
  rHi.value = rHi.max;

  updateSlider(bid);
}

// ==================== EXPORT ====================
function exportBlock(bid, format) {
  var s = sliderState[bid];
  var prods = blockData[bid].filter(function(p) {
    return p.total_sold >= s.soldMin && p.total_sold <= s.soldMax &&
           p.total_revenue >= s.revMin && p.total_revenue <= s.revMax;
  });
  if (!prods.length) return;

  var st = sortState[bid];
  prods.sort(function(a,b) {
    var va = a[st.col], vb = b[st.col];
    if (typeof va === 'string') return st.dir * va.localeCompare(vb);
    return st.dir * (va - vb);
  });

  var headers = ['Product','SKU','Avg Price','Units Sold','Revenue','Avg Sold/Wk','Avg Rev/Wk','Sites','Weeks','Menu %'];
  var rows = prods.map(function(p) {
    return [p.product, p.sku, p.price, p.total_sold, p.total_revenue, p.avg_sold_wk, p.avg_revenue_wk, p.locations, p.weeks_on_menu, p.participation_pct];
  });

  var blockName = bid.charAt(0).toUpperCase() + bid.slice(1);
  var filename = 'QiBi_SnacksDrinks_' + blockName;

  if (format === 'csv') {
    var csv = headers.join(',') + '\n';
    rows.forEach(function(r) { csv += r.map(function(v) { return typeof v==='string' && v.includes(',') ? '"'+v+'"' : v; }).join(',') + '\n'; });
    downloadFile(csv, filename+'.csv', 'text/csv');
  } else if (format === 'xlsx') {
    var ws = XLSX.utils.aoa_to_sheet([headers].concat(rows));
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, blockName);
    XLSX.writeFile(wb, filename+'.xlsx');
  } else if (format === 'pdf') {
    var doc = new jspdf.jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
    doc.setFontSize(14); doc.text('QiBi Snacks & Drinks — ' + blockName, 14, 15);
    doc.setFontSize(8); doc.text('Generated: ' + new Date().toLocaleDateString(), 14, 20);
    doc.autoTable({head:[headers], body:rows, startY:25, styles:{fontSize:7,cellPadding:1.5},
      headStyles:{fillColor:[32,255,0],textColor:[0,0,0],fontStyle:'bold'}, alternateRowStyles:{fillColor:[245,245,245]}});
    doc.save(filename+'.pdf');
  }
}

function downloadFile(content, filename, mimeType) {
  var blob = new Blob([content], {type: mimeType});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

// ==================== SEARCH ====================
function onSearchInput(val) {
  var q = val.trim().toLowerCase();
  searchHighlight = q;
  var results = document.getElementById('searchResults');
  if (!q) { results.classList.remove('open'); render(false); return; }
  var matches = DATA.products.filter(function(p) {
    return p.product.toLowerCase().indexOf(q) >= 0 || (p.sku||'').toLowerCase().indexOf(q) >= 0;
  }).slice(0, 10);
  if (matches.length) {
    results.innerHTML = matches.map(function(p) {
      return '<div onclick="selectSearch(\'' + p.product.replace(/'/g,"\\'") + '\')">' + highlightMatch(p.product, q) + ' <span style="color:#555">(' + p.sku + ')</span></div>';
    }).join('');
    results.classList.add('open');
  } else { results.classList.remove('open'); }
  render(false);
}

function highlightMatch(text, query) {
  if (!query) return text;
  var idx = text.toLowerCase().indexOf(query);
  if (idx < 0) return text;
  return text.slice(0, idx) + '<span class="highlight">' + text.slice(idx, idx + query.length) + '</span>' + text.slice(idx + query.length);
}

function selectSearch(name) {
  document.getElementById('searchBox').value = name;
  document.getElementById('searchResults').classList.remove('open');
  searchHighlight = name.toLowerCase();
  render(false);
}
