*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh}
.lottie-corner{position:fixed;top:16px;right:16px;width:56px;height:56px;z-index:100;pointer-events:none;opacity:0.85}
.header{display:flex;align-items:center;gap:14px;padding:24px 32px 0}
.header-logo{height:28px}

.meta{padding:8px 32px 0;font-size:12px;color:#555}
.search-area{padding:24px 32px;max-width:600px}
.search-area input{width:100%;background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:14px 18px;color:#fff;font-size:15px;outline:none;transition:border-color 0.2s}
.search-area input:focus{border-color:#20ff00}
.search-area input::placeholder{color:#444}
.suggestions{background:#111;border:1px solid #1a1a1a;border-radius:10px;max-height:300px;overflow-y:auto;display:none;margin-top:4px}
.suggestions.open{display:block}
.suggestions div{padding:10px 18px;font-size:13px;color:#ccc;cursor:pointer;display:flex;justify-content:space-between}
.suggestions div:hover{background:#1a1a1a;color:#20ff00}
.suggestions div span.cat{color:#555;font-size:11px}
.results{padding:0 32px 40px;display:none}
.results.show{display:block}
.product-header{display:flex;align-items:baseline;gap:16px;margin-bottom:8px}
.product-header h2{font-size:22px;font-weight:600}
.product-header .cat-badge{font-size:11px;background:#20ff0015;color:#20ff00;padding:3px 10px;border-radius:6px;font-weight:500}
.kpi-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.kpi{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:20px 24px;min-width:140px;flex:1}
.kpi .label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi .value{font-size:22px;font-weight:600;color:#fff}
.kpi .sub{font-size:11px;color:#555;margin-top:4px}
.kpi.green .value{color:#20ff00}
.kpi.red .value{color:#ff4444}

.dist-bar .bar:hover{background:#40ff40}
.dist-bar .bar .tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:10}
.dist-bar .bar:hover .tooltip{display:block}
.loc-table{width:100%;border-collapse:collapse}
.loc-table th{text-align:left;padding:10px 12px;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1a1a1a;cursor:pointer;user-select:none}

.loc-table th.sort-desc::after{content:' ▼';color:#20ff00}

.loc-table td.num{text-align:right;font-variant-numeric:tabular-nums}

.bar-cell .bar-fill{height:100%;background:#20ff00;border-radius:3px}
.bar-cell .bar-val{font-size:12px;color:#888;min-width:36px;text-align:right}
.highlight-row td{background:#20ff0008!important}
.footer{text-align:center;padding:32px;font-size:12px;color:#333}

var currentProduct = null;
var sortCol = 'u';
var sortDir = -1;

function onSearch(val) {
  var q = val.trim().toLowerCase();
  var sug = document.getElementById('suggestions');
  if (!q) { sug.classList.remove('open'); return; }
  var matches = DATA.products.filter(function(p) {
    return p.name.toLowerCase().indexOf(q) >= 0;
  }).slice(0, 15);
  if (matches.length) {
    sug.innerHTML = matches.map(function(p) {
      var idx = p.name.toLowerCase().indexOf(q);
      var hl = p.name.slice(0, idx) + '<b style="color:#20ff00">' + p.name.slice(idx, idx + q.length) + '</b>' + p.name.slice(idx + q.length);
      return '<div onclick="selectProduct(\'' + p.name.replace(/'/g, "\\'") + '\')">' + hl + '<span class="cat">' + p.cat + ' &middot; ' + p.tu + 'u</span></div>';
    }).join('');
    sug.classList.add('open');
  } else {
    sug.innerHTML = '<div style="color:#555;cursor:default">No products found</div>';
    sug.classList.add('open');
  }
}

function selectProduct(name) {
  document.getElementById('searchInput').value = name;
  document.getElementById('suggestions').classList.remove('open');
  var p = DATA.products.find(function(x) { return x.name === name; });
  if (!p) return;
  currentProduct = p;
  sortCol = 'u'; sortDir = -1;
  renderProduct();
}

function fmt(n) { return n.toLocaleString('en-CH'); }
function fmtCHF(n) { return 'CHF ' + n.toLocaleString('en-CH', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function renderProduct() {
  var p = currentProduct;
  if (!p) return;
  document.getElementById('prodName').textContent = p.name;
  document.getElementById('prodCat').textContent = p.cat;
  
  var concLabel = p.cv < 0.4 ? 'Even spread' : p.cv < 0.7 ? 'Moderate' : 'Concentrated';
  var concClass = p.cv < 0.4 ? 'green' : p.cv >= 0.7 ? 'red' : '';
  
  document.getElementById('kpiRow').innerHTML =
    '<div class="kpi"><div class="label">Total Sold</div><div class="value">' + fmt(p.tu) + '</div><div class="sub">' + fmtCHF(p.tr) + ' revenue</div></div>' +
    '<div class="kpi"><div class="label">Locations</div><div class="value">' + p.nl + '</div><div class="sub">of ' + DATA.total_locations + ' total</div></div>' +
    '<div class="kpi"><div class="label">Avg / Fridge</div><div class="value">' + p.avg + '</div><div class="sub">Median: ' + p.med + '</div></div>' +
    '<div class="kpi ' + concClass + '"><div class="label">Concentration</div><div class="value">' + p.cv.toFixed(2) + '</div><div class="sub">' + concLabel + ' &middot; Top 10: ' + p.t10 + '%</div></div>';
  
  // Distribution bar chart
  var maxU = Math.max.apply(null, p.locs.map(function(l) { return l.u; }));
  var barHtml = '';
  p.locs.forEach(function(l) {
    var h = Math.max(4, Math.round(l.u / maxU * 100));
    barHtml += '<div class="bar" style="height:' + h + '%;flex:1"><div class="tooltip">' + l.l + ': ' + l.u + 'u</div></div>';
  });
  document.getElementById('distBar').innerHTML = barHtml;
  
  renderTable();
  document.getElementById('results').classList.add('show');
}

function renderTable() {
  var p = currentProduct;
  var locs = p.locs.slice();
  
  if (sortCol === 'rank') {
    locs.sort(function(a,b) { return sortDir * (a.u - b.u); }); // rank by units default
  } else {
    locs.sort(function(a,b) {
      var va = sortCol === 'l' ? a.l : a[sortCol];
      var vb = sortCol === 'l' ? b.l : b[sortCol];
      if (typeof va === 'string') return sortDir * va.localeCompare(vb);
      return sortDir * (va - vb);
    });
  }
  
  var maxU = Math.max.apply(null, locs.map(function(l) { return l.u; }));
  var tbody = document.getElementById('locBody');
  var html = '';
  locs.forEach(function(l, i) {
    var pct = (l.u / p.tu * 100);
    var barW = (l.u / maxU * 100);
    html += '<tr>' +
      '<td class="num">' + (i+1) + '</td>' +
      '<td>' + l.l + '</td>' +
      '<td class="num">' + fmt(l.u) + '</td>' +
      '<td class="num">' + fmtCHF(l.r) + '</td>' +
      '<td class="num">' + l.w + '</td>' +
      '<td class="num">' + l.uw.toFixed(1) + '</td>' +
      '<td><div class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:' + barW + '%"></div></div><div class="bar-val">' + pct.toFixed(1) + '%</div></div></td>' +
      '</tr>';
  });
  tbody.innerHTML = html;
  
  // Update sort indicators
  document.querySelectorAll('.loc-table th').forEach(function(th) {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    }
  });
}

// Sort click handlers
document.querySelectorAll('.loc-table th').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = this.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = col === 'l' ? 1 : -1; }
    renderTable();
  });
});

// Close suggestions on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-area')) {
    document.getElementById('suggestions').classList.remove('open');
  }
});

// Keyboard nav
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('suggestions').classList.remove('open');
