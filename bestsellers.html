<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:Inter,system-ui,-apple-system,sans-serif;font-size:13px;line-height:1.5;}
a{color:#20ff00;text-decoration:none;}
.container{max-width:1800px;margin:0 auto;padding:20px 24px;}
.header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #1a1a1a;}
.header img,.header svg{height:32px;}
.header h1{font-size:20px;font-weight:700;color:#fff;}
.header h1 span{color:#20ff00;}
.back-link{font-size:12px;color:#888;margin-left:auto;}
.back-link:hover{color:#20ff00;}

/* Filters */
.filter-bar{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:16px 20px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-group label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;}
.filter-group .ms-container{position:relative;}
.ms-btn{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:6px 28px 6px 10px;font-size:12px;color:#fff;cursor:pointer;min-width:160px;text-align:left;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ms-btn:hover{border-color:#20ff00;}
.ms-btn::after{content:"\25BC";position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:8px;color:#888;}
.ms-drop{display:none;position:absolute;top:100%;left:0;background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:8px;z-index:1000;max-height:300px;overflow-y:auto;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
.ms-drop.open{display:block;}
.ms-drop input[type=text]{width:100%;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px;padding:4px 8px;color:#fff;font-size:12px;margin-bottom:6px;}
.ms-drop .ms-actions{display:flex;gap:8px;margin-bottom:6px;}
.ms-drop .ms-actions span{font-size:11px;color:#20ff00;cursor:pointer;}
.ms-drop .ms-actions span:hover{text-decoration:underline;}
.ms-drop label{display:flex;align-items:center;gap:6px;padding:3px 4px;font-size:12px;cursor:pointer;border-radius:3px;}
.ms-drop label:hover{background:#1a1a1a;}
.ms-drop input[type=checkbox]{accent-color:#20ff00;}

/* Week scroller */
.week-scroller{max-height:200px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill, minmax(110px, 1fr));gap:2px;}
.week-scroller label{font-size:11px;padding:2px 4px;}

/* Blocks */
.blocks{display:flex;flex-direction:column;gap:24px;}
.block{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:20px;position:relative;}
.block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.block-title{font-size:16px;font-weight:700;}
.block-title .count{font-size:12px;color:#888;font-weight:400;margin-left:8px;}
.block-badges{display:flex;gap:8px;align-items:center;}
.badge{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;}
.badge-hot{background:#ef444420;color:#ef4444;}
.badge-cold{background:#3b82f620;color:#3b82f6;}
.badge-desserts{background:#f59e0b20;color:#f59e0b;}

/* Export buttons */
.export-group{display:flex;gap:6px;}
.export-btn{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:4px 10px;font-size:11px;color:#888;cursor:pointer;font-family:Inter,system-ui,sans-serif;transition:all 0.2s;}
.export-btn:hover{border-color:#20ff00;color:#20ff00;}

/* KPI mini row */
.block-kpis{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.mini-kpi{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:8px 14px;min-width:100px;}
.mini-kpi .mk-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.3px;}
.mini-kpi .mk-value{font-size:16px;font-weight:700;color:#fff;}
.mini-kpi .mk-value.green{color:#20ff00;}

/* Tables */
.table-wrap{overflow-x:auto;max-height:600px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{position:sticky;top:0;z-index:10;}
th{background:#0a0a0a;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;color:#888;cursor:pointer;white-space:nowrap;border-bottom:1px solid #1a1a1a;user-select:none;}
th:hover{color:#20ff00;}
th .sort-arrow{margin-left:4px;font-size:9px;color:#3b82f6;}
td{padding:7px 10px;border-bottom:1px solid #0d0d0d;white-space:nowrap;}
tr:hover{background:#1a1a1a;}
.num{text-align:right;}
.chf{text-align:right;}
.pct{text-align:right;}
.good{color:#20ff00;}
.warn{color:#f59e0b;}
.bad{color:#ef4444;}
.neutral{color:#888;}

/* Sparklines */
.sparkline{display:inline-block;width:240px;height:24px;vertical-align:middle;}
.sparkline svg{width:100%;height:100%;}

/* Footer */
.footer{text-align:center;color:#555;font-size:11px;padding:24px 0 12px;border-top:1px solid #1a1a1a;margin-top:32px;}

/* Lottie corner */
.lottie-corner{position:fixed;top:70px;right:24px;width:60px;height:60px;opacity:0.15;pointer-events:none;z-index:9999;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#555;}

.block-sliders{display:flex;align-items:center;gap:24px;padding:10px 16px;background:#111;border:1px solid #1a1a1a;border-radius:10px;margin:8px 0;}
.slider-group{flex:1;}
.slider-group label{font-size:12px;color:#888;margin-bottom:6px;display:block;}
.slider-group label .sv{color:#20ff00;font-weight:600;}
.dual-slider{position:relative;height:32px;}
.dual-slider input[type=range]{-webkit-appearance:none;appearance:none;position:absolute;left:0;top:8px;width:100%;height:0;margin:0;padding:0;background:none;pointer-events:none;z-index:2;}
.dual-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:18px;width:18px;border-radius:50%;background:#20ff00;cursor:pointer;pointer-events:auto;border:2px solid #0a0a0a;position:relative;z-index:3;margin-top:0;}
.dual-slider input[type=range]::-moz-range-thumb{height:18px;width:18px;border-radius:50%;background:#20ff00;cursor:pointer;pointer-events:auto;border:2px solid #0a0a0a;}
.dual-slider input[type=range]::-webkit-slider-runnable-track{height:4px;background:transparent;border-radius:2px;}
.dual-slider input[type=range]::-moz-range-track{height:4px;background:transparent;border-radius:2px;}
.dual-slider .track{position:absolute;left:0;right:0;top:14px;height:4px;background:#333;border-radius:2px;z-index:0;}
.dual-slider .track-fill{position:absolute;top:14px;height:4px;background:#20ff00;border-radius:2px;z-index:1;opacity:0.4;}
.reset-btn{background:#1a1a1a;color:#888;border:1px solid #333;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;white-space:nowrap;align-self:flex-end;}
.reset-btn:hover{color:#20ff00;border-color:#20ff00;}

.search-wrap{position:relative;}
.search-input{width:100%;padding:7px 10px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;font-size:13px;font-family:Inter,system-ui,sans-serif;outline:none;box-sizing:border-box;}
.search-input:focus{border-color:#20ff00;}
.search-input::placeholder{color:#555;}
.search-suggestions{position:absolute;top:100%;left:0;right:0;background:#111;border:1px solid #333;border-radius:6px;max-height:240px;overflow-y:auto;z-index:100;display:none;margin-top:2px;}
.search-suggestions.open{display:block;}
.sug-item{padding:8px 12px;cursor:pointer;font-size:13px;color:#ccc;border-bottom:1px solid #1a1a1a;}
.sug-item:hover,.sug-item.active{background:#1a1a1a;color:#20ff00;}
.sug-item .sug-sku{color:#555;font-size:11px;margin-left:8px;}
.sug-item .sug-match{color:#20ff00;font-weight:600;}
.bestseller-btn-wrap { text-align:center; margin:8px 0; }
.bestseller-btn {
  background:#20ff00; color:#0a0a0a; border:none; padding:6px 22px;
  border-radius:20px; font-weight:700; font-size:12px; letter-spacing:1px;
  cursor:pointer; transition:all .2s;
}
.bestseller-btn:hover { background:#1de000; box-shadow:0 0 12px rgba(32,255,0,.4); }
.bestseller-btn.active { box-shadow:0 0 16px rgba(32,255,0,.5); }
</style>
</head>

<script>

// ==================== MULTI-SELECT ====================
function MultiSelect(containerId, items, placeholder, onChange) {
  var self = this;
  self.selected = new Set(items);
  self.items = items;
  self.onChange = onChange;
  var container = document.getElementById(containerId);
  var btn = document.createElement('div');
  btn.className = 'ms-btn';
  btn.textContent = placeholder;
  var drop = document.createElement('div');
  drop.className = 'ms-drop';

  var search = document.createElement('input');
  search.type = 'text';
  search.placeholder = 'Search...';
  drop.appendChild(search);

  var actions = document.createElement('div');
  actions.className = 'ms-actions';
  var selAll = document.createElement('span');
  selAll.textContent = 'Select all';
  var clrAll = document.createElement('span');
  clrAll.textContent = 'Clear all';
  actions.appendChild(selAll);
  actions.appendChild(clrAll);
  drop.appendChild(actions);

  var list = document.createElement('div');
  list.className = containerId === 'msWeeks' ? 'week-scroller' : '';
  items.forEach(function(item) {
    var lbl = document.createElement('label');
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = true;
    cb.value = item;
    cb.addEventListener('change', function() {
      if (this.checked) self.selected.add(item);
      else self.selected.delete(item);
      updateLabel();
      onChange();
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(' ' + item));
    list.appendChild(lbl);
  });
  drop.appendChild(list);

  selAll.addEventListener('click', function() {
    self.selected = new Set(items);
    drop.querySelectorAll('input[type=checkbox]').forEach(function(cb) { cb.checked = true; });
    updateLabel();
    onChange();
  });
  clrAll.addEventListener('click', function() {
    self.selected.clear();
    drop.querySelectorAll('input[type=checkbox]').forEach(function(cb) { cb.checked = false; });
    updateLabel();
    onChange();
  });

  search.addEventListener('input', function() {
    var q = this.value.toLowerCase();
    list.querySelectorAll('label').forEach(function(lbl) {
      lbl.style.display = lbl.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    drop.classList.toggle('open');
  });
  document.addEventListener('click', function() { drop.classList.remove('open'); });
  drop.addEventListener('click', function(e) { e.stopPropagation(); });

  function updateLabel() {
    if (self.selected.size === items.length) btn.textContent = placeholder;
    else if (self.selected.size === 0) btn.textContent = 'None selected';
    else if (self.selected.size <= 2) btn.textContent = Array.from(self.selected).join(', ');
    else btn.textContent = self.selected.size + ' selected';
  }

  container.appendChild(btn);
  container.appendChild(drop);

  self.getSelected = function() { return self.selected; };
  self.isAll = function() { return self.selected.size === items.length; };
}

// ==================== HELPERS ====================
function fmt(n) { return n >= 1000 ? Math.round(n).toLocaleString('en-CH') : Math.round(n).toString(); }
function fmtCHF(n) { return 'CHF ' + fmt(Math.abs(n)); }
function fmtPct(n) { return (typeof n === 'number' ? n.toFixed(1) : '0.0') + '%'; }

function makeSparklineSVG(data, selectedWeekIdxs) {
  var vals = selectedWeekIdxs.map(function(i) { return data[i] || 0; });
  if (vals.length === 0) return '';
  var max = Math.max.apply(null, vals) || 1;
  var w = 240, h = 24, pad = 2;
  var step = vals.length > 1 ? (w - 2*pad) / (vals.length - 1) : 0;
  var points = vals.map(function(v, i) {
    return (pad + i * step) + ',' + (h - pad - (v/max) * (h - 2*pad));
  }).join(' ');
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">' +
    '<polyline points="' + points + '" fill="none" stroke="#20ff00" stroke-width="1.5" stroke-linejoin="round"/>' +
    '</svg>';
}

// ==================== STATE ====================

// ==================== INIT ====================
var allProducts = DATA.products.map(function(p) { return p.product; }).sort();
msWeeks = new MultiSelect('msWeeks', DATA.weeks, 'All weeks (' + DATA.weeks.length + ')', render);
msProducts = new MultiSelect('msProducts', allProducts, 'All products (' + allProducts.length + ')', render);

// ==================== FILTER & COMPUTE ====================
function getFilteredProducts() {
  var selWeeks = msWeeks.getSelected();
  var selProds = msProducts.getSelected();
  var weekIdxs = [];
  DATA.weeks.forEach(function(w, i) { if (selWeeks.has(w)) weekIdxs.push(i); });
  
  // If all weeks selected, use precomputed stats
  if (msWeeks.isAll() && msProducts.isAll()) {
    return {products: DATA.products, weekIdxs: weekIdxs};
  }
  
  // Build product-week lookup
  var pwMap = {};
  DATA.prod_weekly.forEach(function(r) {
    if (!selWeeks.has(r.menu_week)) return;
    if (!pwMap[r.product]) pwMap[r.product] = {introduced:0, sold:0, wasted:0, weeks:0};
    var m = pwMap[r.product];
    m.introduced += r.introduced;
    m.sold += r.sold;
    m.wasted += r.wasted;
    var ww = (DATA.week_weights[r.product] && DATA.week_weights[r.product][r.menu_week]) || (r.introduced >= 30 ? 1 : 0);
    m.weeks += ww;
    m.raw_weeks = (m.raw_weeks || 0) + 1;
  });
  
  var filtered = [];
  DATA.products.forEach(function(p) {
    if (!selProds.has(p.product)) return;
    var pw = pwMap[p.product];
    if (!pw || pw.introduced === 0) return;
    var weeksOnMenu = pw.weeks;
    var avgSoldWk = weeksOnMenu > 0 ? +(pw.sold / weeksOnMenu).toFixed(1) : 0;
    var avgRevenueWk = weeksOnMenu > 0 ? +(pw.sold * p.price / weeksOnMenu).toFixed(1) : 0;
    var avgWastedWk = weeksOnMenu > 0 ? +(pw.wasted / weeksOnMenu).toFixed(1) : 0;
    var revPerWaste = pw.wasted > 0 ? +(pw.sold * p.price / pw.wasted).toFixed(1) : 0;
    var totalWeeks = weekIdxs.length;
    
    filtered.push({
      product: p.product,
      sku: p.sku,
      category: p.category,
      block: p.block,
      price: p.price,
      unit_cost: p.unit_cost,
      introduced: pw.introduced,
      sold: pw.sold,
      wasted: pw.wasted,
      wastage_pct: pw.introduced > 0 ? +(pw.wasted / pw.introduced * 100).toFixed(1) : 0,
      sell_through_pct: pw.introduced > 0 ? +(pw.sold / pw.introduced * 100).toFixed(1) : 0,
      total_revenue: Math.round(pw.sold * p.price),
      weeks_on_menu: weeksOnMenu,
      raw_weeks: pw ? (pw.raw_weeks || 0) : 0,
      avg_sold_wk: avgSoldWk,
      avg_revenue_wk: avgRevenueWk,
      avg_wasted_wk: avgWastedWk,
      avg_intro_wk: weeksOnMenu > 0 ? +(pw.introduced / weeksOnMenu).toFixed(1) : 0,
      rev_per_waste: revPerWaste,
      sparkline: p.sparkline
    });
  });
  
  return {products: filtered, weekIdxs: weekIdxs};
}

// ==================== RENDER ====================
function render(resetSliderFlag) {
  if (resetSliderFlag !== false) window._slidersInitialized = false;
  var result = getFilteredProducts();
  var prods = result.products;
  var weekIdxs = result.weekIdxs;
  
  // Apply search filter
  if (searchHighlight) {
    prods = prods.filter(function(p) {
      return p.product.toLowerCase().indexOf(searchHighlight) >= 0 ||
             (p.sku || '').toLowerCase().indexOf(searchHighlight) >= 0;
    });
  }
  blockData.hot = prods.filter(function(p) { return p.block === 'Hot'; });
  blockData.cold = prods.filter(function(p) { return p.block === 'Cold'; });
  blockData.desserts = prods.filter(function(p) { return p.block === 'Desserts'; });
  
  renderBlock('hot', blockData.hot, weekIdxs);
  renderBlock('cold', blockData.cold, weekIdxs);
  renderBlock('desserts', blockData.desserts, weekIdxs);
  // Only init sliders on first render or when week/product filters change
  if (!window._slidersInitialized) {
    initSliders('hot', blockData.hot);
    initSliders('cold', blockData.cold);
    initSliders('desserts', blockData.desserts);
    window._slidersInitialized = true;
  } else {
    // Re-apply current slider state to filter the newly computed block data
    applySliders('hot');
    applySliders('cold');
    applySliders('desserts');
  }
}

function renderBlock(blockId, products, weekIdxs) {
  // Sort
  var st = sortState[blockId];
  products.sort(function(a, b) {
    var va = a[st.col], vb = b[st.col];
    if (typeof va === 'string') return st.dir * va.localeCompare(vb);
    return st.dir * (va - vb);
  });
  
  // KPIs
  var totSold=0, totIntro=0, totWasted=0, totRev=0;
  products.forEach(function(p) { totSold+=p.sold; totIntro+=p.introduced; totWasted+=p.wasted; totRev+=p.total_revenue; });
  var wp = totIntro>0 ? (totWasted/totIntro*100) : 0;
  
  document.getElementById(blockId+'Count').textContent = '(' + products.length + ' products)';
  document.getElementById(blockId+'Kpis').innerHTML =
    '<div class="mini-kpi"><div class="mk-label">Revenue</div><div class="mk-value green">' + fmtCHF(totRev) + '</div></div>' +
    '<div class="mini-kpi"><div class="mk-label">Units Sold</div><div class="mk-value">' + fmt(totSold) + '</div></div>' +
    '<div class="mini-kpi"><div class="mk-label">Introduced</div><div class="mk-value">' + fmt(totIntro) + '</div></div>' +
    '<div class="mini-kpi"><div class="mk-label">Wasted</div><div class="mk-value bad">' + fmt(totWasted) + '</div></div>' +
    '<div class="mini-kpi"><div class="mk-label">Wastage Units %</div><div class="mk-value ' + (wp<=18?'good':wp<=28?'warn':'bad') + '">' + fmtPct(wp) + '</div></div>' +
    '<div class="mini-kpi"><div class="mk-label">Avg Revenue/Wk</div><div class="mk-value">' + fmtCHF(weekIdxs.length>0?totRev/weekIdxs.length:0) + '</div></div>';
  
  // Table
  var cols = [
    {key:'product', label:'Product', cls:''},
    {key:'sku', label:'SKU', cls:''},
    {key:'category', label:'Cat', cls:''},
    {key:'price', label:'Price', cls:'chf'},
    {key:'avg_sold_wk', label:'Avg Sold/Wk', cls:'num'},
    {key:'avg_revenue_wk', label:'Avg Rev/Wk', cls:'chf'},
    {key:'avg_wasted_wk', label:'Avg Waste/Wk', cls:'num'},
    {key:'wastage_pct', label:'Wastage Units %', cls:'pct'},
    {key:'total_revenue', label:'Revenue', cls:'chf'},
    {key:'sold', label:'Units Sold', cls:'num'},
    {key:'introduced', label:'Introduced', cls:'num'},
    {key:'wasted', label:'Wasted', cls:'num'},
    {key:'rev_per_waste', label:'Rev/Waste', cls:'chf'},
    {key:'weeks_on_menu', label:'Weeks', cls:'num'},
    {key:'raw_weeks', label:'Participation', cls:'num'},
    {key:'sparkline', label:'Trend', cls:''}
  ];
  
  var h = '<thead><tr>';
  cols.forEach(function(c) {
    var arrow = '';
    if (st.col === c.key) arrow = '<span class="sort-arrow">' + (st.dir === 1 ? '&#9650;' : '&#9660;') + '</span>';
    h += '<th class="' + c.cls + '" data-col="' + c.key + '" data-block="' + blockId + '">' + c.label + arrow + '</th>';
  });
  h += '</tr></thead><tbody>';
  
  products.forEach(function(p) {
    var wpCls = p.wastage_pct<=18?'good':p.wastage_pct<=28?'warn':'bad';
    var spark = makeSparklineSVG(p.sparkline, weekIdxs);
    h += '<tr>' +
      '<td>' + p.product + '</td>' +
      '<td>' + (p.sku||'') + '</td>' +
      '<td>' + p.category + '</td>' +
      '<td class="chf">CHF ' + p.price.toFixed(2) + '</td>' +
      '<td class="num">' + p.avg_sold_wk + '</td>' +
      '<td class="chf">' + fmtCHF(p.avg_revenue_wk) + '</td>' +
      '<td class="num">' + p.avg_wasted_wk + '</td>' +
      '<td class="pct ' + wpCls + '">' + fmtPct(p.wastage_pct) + '</td>' +
      '<td class="chf">' + fmtCHF(p.total_revenue) + '</td>' +
      '<td class="num">' + fmt(p.sold) + '</td>' +
      '<td class="num">' + fmt(p.introduced) + '</td>' +
      '<td class="num bad">' + fmt(p.wasted) + '</td>' +
      '<td class="chf">' + (p.rev_per_waste > 0 ? fmtCHF(p.rev_per_waste) : '—') + '</td>' +
      '<td class="num">' + p.weeks_on_menu + '</td>' +
      '<td class="num">' + (p.raw_weeks || 0) + '</td>' +
      '<td class="sparkline">' + spark + '</td>' +
      '</tr>';
  });
  h += '</tbody>';
  document.getElementById('table' + blockId.charAt(0).toUpperCase() + blockId.slice(1)).innerHTML = h;
  
  // Bind sort
  document.querySelectorAll('#table' + blockId.charAt(0).toUpperCase() + blockId.slice(1) + ' th').forEach(function(th) {
    th.addEventListener('click', function() {
      var col = this.dataset.col;
      var blk = this.dataset.block;
      if (col === 'sparkline') return;
      if (sortState[blk].col === col) sortState[blk].dir *= -1;
      else { sortState[blk].col = col; sortState[blk].dir = -1; }
      rerenderBlock(blk);
    });
  });
}

// ==================== EXPORT ====================
function exportBlock(blockId, format) {
  var s = sliderState[blockId];
  var prods = blockData[blockId].filter(function(p) {
    return p.avg_sold_wk >= s.soldMin && p.avg_sold_wk <= s.soldMax &&
           p.wastage_pct >= s.wasteMin && p.wastage_pct <= s.wasteMax;
  });
  if (prods.length === 0) return;
  
  var headers = ['Product','SKU','Category','Price','Avg Sold/Wk','Avg Rev/Wk','Avg Waste/Wk','Wastage Units %','Revenue','Units Sold','Introduced','Wasted','Rev/Waste','Weeks on Menu','Participation'];
  var rows = prods.map(function(p) {
    return [p.product, p.sku, p.category, p.price, p.avg_sold_wk, p.avg_revenue_wk, p.avg_wasted_wk, p.wastage_pct, p.total_revenue, p.sold, p.introduced, p.wasted, p.rev_per_waste, p.weeks_on_menu, p.raw_weeks];
  });
  
  var filename = 'QiBi_BestSellers_' + blockId.charAt(0).toUpperCase() + blockId.slice(1);
  
  if (format === 'csv') {
    var csv = headers.join(',') + '\n';
    rows.forEach(function(r) {
      csv += r.map(function(v) { return typeof v === 'string' && v.includes(',') ? '"'+v+'"' : v; }).join(',') + '\n';
    });
    downloadFile(csv, filename + '.csv', 'text/csv');
  }
  else if (format === 'xlsx') {
    var ws = XLSX.utils.aoa_to_sheet([headers].concat(rows));
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, blockId.charAt(0).toUpperCase() + blockId.slice(1));
    XLSX.writeFile(wb, filename + '.xlsx');
  }
  else if (format === 'pdf') {
    var doc = new jspdf.jsPDF({orientation: 'landscape', unit: 'mm', format: 'a4'});
    doc.setFontSize(14);
    doc.text('QiBi Best Sellers — ' + blockId.charAt(0).toUpperCase() + blockId.slice(1), 14, 15);
    doc.setFontSize(8);
    doc.text('Generated: ' + new Date().toLocaleDateString(), 14, 20);
    doc.autoTable({
      head: [headers],
      body: rows,
      startY: 25,
      styles: {fontSize: 7, cellPadding: 1.5},
      headStyles: {fillColor: [32, 255, 0], textColor: [0,0,0], fontStyle: 'bold'},
      alternateRowStyles: {fillColor: [245,245,245]}
    });
    doc.save(filename + '.pdf');
  }
}

function downloadFile(content, filename, mimeType) {
  var blob = new Blob([content], {type: mimeType});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}



// ==================== BLOCK SLIDERS ====================
var sliderState = {
  hot: {soldMin:0, soldMax:500, wasteMin:0, wasteMax:100},
  cold: {soldMin:0, soldMax:500, wasteMin:0, wasteMax:100},
  desserts: {soldMin:0, soldMax:500, wasteMin:0, wasteMax:100}
};

function initSliders(bid, products) {
  if (!products || products.length === 0) return;
  var maxSold = Math.ceil(Math.max.apply(null, products.map(function(p){return p.avg_sold_wk;})));
  var maxWaste = Math.ceil(Math.max.apply(null, products.map(function(p){return p.wastage_pct;})));
  maxSold = Math.max(maxSold, 10);
  maxWaste = Math.min(Math.max(maxWaste, 10), 100);
  
  var sMin = document.getElementById(bid+'SoldMin');
  var sHi = document.getElementById(bid+'SoldHi');
  var wMin = document.getElementById(bid+'WasteMin');
  var wHi = document.getElementById(bid+'WasteHi');
  if (!sMin) return;
  
  sMin.max = maxSold; sHi.max = maxSold;
  sMin.value = 0; sHi.value = maxSold;
  wMin.max = maxWaste; wHi.max = maxWaste;
  wMin.value = 0; wHi.value = maxWaste;
  
  sliderState[bid] = {soldMin:0, soldMax:maxSold, wasteMin:0, wasteMax:maxWaste};
  updateSliderLabels(bid);
}

function updateSlider(bid) {
  var sMin = +document.getElementById(bid+'SoldMin').value;
  var sHi = +document.getElementById(bid+'SoldHi').value;
  var wMin = +document.getElementById(bid+'WasteMin').value;
  var wHi = +document.getElementById(bid+'WasteHi').value;
  
  // Enforce min <= max
  if (sMin > sHi) { document.getElementById(bid+'SoldMin').value = sHi; sMin = sHi; }
  if (wMin > wHi) { document.getElementById(bid+'WasteMin').value = wHi; wMin = wHi; }
  
  sliderState[bid] = {soldMin:sMin, soldMax:sHi, wasteMin:wMin, wasteMax:wHi};
  updateSliderLabels(bid);
  
  // Re-render just this block with filtered data
  var filtered = blockData[bid].filter(function(p) {
    return p.avg_sold_wk >= sMin && p.avg_sold_wk <= sHi &&
           p.wastage_pct >= wMin && p.wastage_pct <= wHi;
  });
  var result = getFilteredProducts();
  renderBlock(bid, filtered, result.weekIdxs);
}

function updateSliderLabels(bid) {
  var s = sliderState[bid];
  document.getElementById(bid+'SoldVal').textContent = s.soldMin;
  document.getElementById(bid+'SoldMax').textContent = s.soldMax;
  document.getElementById(bid+'WasteVal').textContent = s.wasteMin;
  document.getElementById(bid+'WasteMax').textContent = s.wasteMax;
  // Update track fill positions
  updateTrackFill(bid+'Sold');
  updateTrackFill(bid+'Waste');
}
function updateTrackFill(prefix) {
  var lo = document.getElementById(prefix+'Min');
  var hi = document.getElementById(prefix+'Hi');
  var fill = document.getElementById(prefix+'Fill');
  if (!lo || !hi || !fill) return;
  var max = +lo.max || 100;
  var loVal = +lo.value, hiVal = +hi.value;
  var loP = (loVal / max) * 100, hiP = (hiVal / max) * 100;
  fill.style.left = loP + '%';
  fill.style.width = (hiP - loP) + '%';
}

function resetSliders(bid) {
  initSliders(bid, blockData[bid]);
  var result = getFilteredProducts();
  renderBlock(bid, blockData[bid], result.weekIdxs);
}



// ==================== PRODUCT SEARCH ====================
var searchHighlight = '';

function onSearchInput(val) {
  var box = document.getElementById('searchSuggestions');
  val = val.trim().toLowerCase();
  searchHighlight = val;
  
  if (val.length < 1) {
    box.classList.remove('open');
    box.innerHTML = '';
    searchHighlight = '';
    render();
    return;
  }
  
  // Find matching products
  var matches = [];
  DATA.products.forEach(function(p) {
    var name = p.product.toLowerCase();
    var sku = (p.sku || '').toLowerCase();
    if (name.indexOf(val) >= 0 || sku.indexOf(val) >= 0) {
      matches.push(p);
    }
  });
  
  if (matches.length === 0) {
    box.innerHTML = '<div class="sug-item" style="color:#555;">No matches</div>';
    box.classList.add('open');
    return;
  }
  
  // Render suggestions (max 12)
  var h = '';
  matches.slice(0, 12).forEach(function(p) {
    var display = highlightMatch(p.product, val);
    var skuDisplay = p.sku ? '<span class="sug-sku">' + p.sku + '</span>' : '';
    h += '<div class="sug-item" onclick="selectSearch(\'' + p.product.replace(/'/g, "\\'") + '\')">' + display + skuDisplay + '</div>';
  });
  if (matches.length > 12) {
    h += '<div class="sug-item" style="color:#555;font-size:11px;">+' + (matches.length - 12) + ' more...</div>';
  }
  box.innerHTML = h;
  box.classList.add('open');
  
  // Also filter the blocks live as user types
  render();
}

function highlightMatch(text, query) {
  var idx = text.toLowerCase().indexOf(query);
  if (idx < 0) return text;
  return text.substring(0, idx) + '<span class="sug-match">' + text.substring(idx, idx + query.length) + '</span>' + text.substring(idx + query.length);
}

function selectSearch(productName) {
  document.getElementById('productSearch').value = productName;
  document.getElementById('searchSuggestions').classList.remove('open');
  searchHighlight = productName.toLowerCase();
  render();
}

// Close suggestions on click outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('searchSuggestions').classList.remove('open');
  }
});

// Clear search on Escape
document.getElementById('productSearch').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    this.value = '';
    searchHighlight = '';
    document.getElementById('searchSuggestions').classList.remove('open');
    render();
  }
});


// ==================== SLIDER-AWARE RE-RENDER ====================
function applySliders(bid) {
  var s = sliderState[bid];
  var filtered = blockData[bid].filter(function(p) {
    return p.avg_sold_wk >= s.soldMin && p.avg_sold_wk <= s.soldMax &&
           p.wastage_pct >= s.wasteMin && p.wastage_pct <= s.wasteMax;
  });
  var result = getFilteredProducts();
  renderBlock(bid, filtered, result.weekIdxs);
  // Update slider ranges to match new data but keep current thumb positions
  updateSliderRanges(bid, blockData[bid]);
}

function updateSliderRanges(bid, products) {
  if (!products || products.length === 0) return;
  var maxSold = Math.ceil(Math.max.apply(null, products.map(function(p){return p.avg_sold_wk;})));
  var maxWaste = Math.ceil(Math.max.apply(null, products.map(function(p){return p.wastage_pct;})));
  maxSold = Math.max(maxSold, 10);
  maxWaste = Math.min(Math.max(maxWaste, 10), 100);
  
  var sMin = document.getElementById(bid+'SoldMin');
  var sHi = document.getElementById(bid+'SoldHi');
  var wMin = document.getElementById(bid+'WasteMin');
  var wHi = document.getElementById(bid+'WasteHi');
  if (!sMin) return;
  
  sMin.max = maxSold; sHi.max = maxSold;
  wMin.max = maxWaste; wHi.max = maxWaste;
  
  // Clamp current values to new range
  if (+sHi.value > maxSold) sHi.value = maxSold;
  if (+wHi.value > maxWaste) wHi.value = maxWaste;
  sliderState[bid].soldMax = +sHi.value;
  sliderState[bid].wasteMax = +wHi.value;
  updateSliderLabels(bid);
}

function rerenderBlock(bid) {
  var s = sliderState[bid];
  var filtered = blockData[bid].filter(function(p) {
    return p.avg_sold_wk >= s.soldMin && p.avg_sold_wk <= s.soldMax &&
           p.wastage_pct >= s.wasteMin && p.wastage_pct <= s.wasteMax;
  });
  var result = getFilteredProducts();
  renderBlock(bid, filtered, result.weekIdxs);
}

function applyBestseller(bid) {
  var preset = bestsellerPresets[bid];

  var sHi  = document.getElementById(bid + 'SoldHi');

  wHi.value  = preset.wasteMax;

}
